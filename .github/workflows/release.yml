name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check tag matches manifest version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "${TAG#v}" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build packages
        run: npm run build

      - name: Rename packages with tag version
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd dist
          for f in ratpack-*.zip; do
            if [[ "$f" == *chrome* ]]; then
              mv "$f" "ratpack-${VERSION}-chrome.zip"
            else
              mv "$f" "ratpack-${VERSION}-firefox.zip"
            fi
          done
          ls -la

      - name: Sign Firefox extension (AMO, unlisted)
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir . \
            --artifacts-dir dist \
            --channel unlisted \
            --ignore-files 'package-lock.json' 'scripts/**' 'notes/**' 'AGENTS.md' 'docs/**' 'dist/**' 'updates.json'

      - name: Rename signed xpi
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd dist
          xpi=$(ls *.xpi | head -n1)
          mv "$xpi" "ratpack-${VERSION}-firefox.xpi"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.notes.outputs.NOTES }}

            ## Installation
            ### Firefox
            Download `ratpack-${{ github.ref_name }}-firefox.xpi` (signed) and open it in Firefox — installs permanently, no `about:debugging` needed.

            The unsigned `ratpack-${{ github.ref_name }}-firefox.zip` remains for temporary sideloading via `about:debugging`.

            ### Chrome
            Download `ratpack-${{ github.ref_name }}-chrome.zip`, then:
            1. Open `chrome://extensions/`
            2. Enable Developer mode
            3. Drag the zip into the window
          files: |
            dist/ratpack-${{ github.ref_name }}-firefox.xpi
            dist/ratpack-${{ github.ref_name }}-firefox.zip
            dist/ratpack-${{ github.ref_name }}-chrome.zip
          draft: false
          prerelease: false
