<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ratpack</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>ratpack</h1>
      <p id="user-count" class="user-count" aria-live="polite">0 users</p>
    </header>
    <main>
      <form id="add-form" class="add-form" autocomplete="off">
        <label for="uid-input" class="visually-hidden">Squadrats UID</label>
        <input
          id="uid-input"
          name="uid"
          type="text"
          placeholder="Squadrats UID"
          autocomplete="off"
        />
        <button type="submit">Add</button>
      </form>
      <p id="error-message" class="error-message" role="alert" hidden></p>
      <ul id="user-list" class="user-list" aria-label="Added users"></ul>
      <p id="empty-state" class="empty-state">
        No users yet. Add a Squadrats UID above.
      </p>
      <button id="clear-all" type="button" class="clear-all" hidden>
        Clear all
      </button>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
